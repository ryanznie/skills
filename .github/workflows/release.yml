name: Release

on:
  workflow_dispatch:
    inputs:
      plugin:
        description: "Plugin name to release"
        required: true
        type: choice
        options:
          - calendar-skills
          - productivity
        default: calendar-skills
      prerelease:
        description: "Mark as pre-release"
        type: boolean
        default: false

jobs:
  publish-tags:
    name: Publish Release Tags
    runs-on: ubuntu-latest
    permissions:
      contents: write
    env:
      RELEASE_TOKEN: ${{ secrets.RELEASE_TOKEN }}

    outputs:
      plugin: ${{ steps.meta.outputs.plugin }}
      version: ${{ steps.meta.outputs.version }}
      patch_tag: ${{ steps.meta.outputs.patch_tag }}
      minor_tag: ${{ steps.meta.outputs.minor_tag }}
      prev_tag: ${{ steps.meta.outputs.prev_tag }}

    steps:
      - name: Require release token
        run: |
          if [ -z "$RELEASE_TOKEN" ]; then
            echo "::error::Missing RELEASE_TOKEN secret. Add a token with tag and release permissions."
            exit 1
          fi

      - uses: actions/checkout@v6
        with:
          fetch-depth: 0
          token: ${{ secrets.RELEASE_TOKEN }}

      - name: Configure git author
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"

      - name: Read release metadata
        id: meta
        env:
          PLUGIN: ${{ inputs.plugin }}
        run: |
          VERSION=$(jq -r '.version' "plugins/${PLUGIN}/.claude-plugin/plugin.json")
          case "$VERSION" in
            [0-9]*.[0-9]*.[0-9]*) ;;
            *)
              echo "::error::plugin.json version must be in x.y.z format."
              exit 1
              ;;
          esac

          IFS='.' read -r MAJOR MINOR PATCH <<< "$VERSION"
          PATCH_TAG="v${VERSION}+${PLUGIN}"
          MINOR_TAG="v${MAJOR}.${MINOR}+${PLUGIN}"
          PREV_VERSION=$(git tag --list "v*+${PLUGIN}" | while IFS= read -r tag; do
            case "$tag" in
              v[0-9]*.[0-9]*.[0-9]*+"${PLUGIN}")
                printf '%s\n' "${tag#v}"
                ;;
            esac
          done | sort -V | tail -n 1)
          PREV_TAG=""
          if [ -n "$PREV_VERSION" ]; then
            PREV_TAG="v${PREV_VERSION}"
          fi

          echo "plugin=$PLUGIN" >> "$GITHUB_OUTPUT"
          echo "version=$VERSION" >> "$GITHUB_OUTPUT"
          echo "patch_tag=$PATCH_TAG" >> "$GITHUB_OUTPUT"
          echo "minor_tag=$MINOR_TAG" >> "$GITHUB_OUTPUT"
          echo "prev_tag=$PREV_TAG" >> "$GITHUB_OUTPUT"

      - name: Check immutable tag does not already exist
        env:
          PATCH_TAG: ${{ steps.meta.outputs.patch_tag }}
        run: |
          if git rev-parse "refs/tags/${PATCH_TAG}" >/dev/null 2>&1; then
            echo "::error::Tag ${PATCH_TAG} already exists."
            exit 1
          fi

      - name: Create release tags
        env:
          PATCH_TAG: ${{ steps.meta.outputs.patch_tag }}
          MINOR_TAG: ${{ steps.meta.outputs.minor_tag }}
        run: |
          COMMIT=$(git rev-parse HEAD)
          git tag "$PATCH_TAG" "$COMMIT"
          git tag -f "$MINOR_TAG" "$COMMIT"

      - name: Push release tags
        env:
          PATCH_TAG: ${{ steps.meta.outputs.patch_tag }}
          MINOR_TAG: ${{ steps.meta.outputs.minor_tag }}
        run: |
          git push origin "$PATCH_TAG"
          git push origin "$MINOR_TAG" --force

  create-github-release:
    name: Create GitHub Release
    needs: publish-tags
    runs-on: ubuntu-latest
    permissions:
      contents: write
    env:
      RELEASE_TOKEN: ${{ secrets.RELEASE_TOKEN }}

    steps:
      - name: Require release token
        run: |
          if [ -z "$RELEASE_TOKEN" ]; then
            echo "::error::Missing RELEASE_TOKEN secret. Add a token with tag and release permissions."
            exit 1
          fi

      - uses: actions/checkout@v6
        with:
          fetch-depth: 0
          ref: ${{ needs.publish-tags.outputs.patch_tag }}
          token: ${{ secrets.RELEASE_TOKEN }}

      - name: Configure git author
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"

      - name: Generate release notes
        env:
          PLUGIN: ${{ needs.publish-tags.outputs.plugin }}
          PATCH_TAG: ${{ needs.publish-tags.outputs.patch_tag }}
          PREV_TAG: ${{ needs.publish-tags.outputs.prev_tag }}
        run: |
          if [ -n "$PREV_TAG" ]; then
            RANGE="${PREV_TAG}..${PATCH_TAG}"
          else
            RANGE="${PATCH_TAG}"
          fi

          git log "$RANGE" --pretty=format:"%H %s" -- "plugins/${PLUGIN}" > /tmp/commits.txt

          FEATURES="" DOCS="" FIXES="" CHORES="" OTHER=""

          while IFS= read -r line; do
            HASH=$(echo "$line" | cut -d' ' -f1)
            SUBJECT=$(echo "$line" | cut -d' ' -f2-)
            SHORT="${HASH:0:7}"
            ENTRY="- ${SUBJECT} (\`${SHORT}\`)"

            case "$SUBJECT" in
              feat*|add*|Add*|new*|New*|implement*|Implement*)
                FEATURES="${FEATURES}"$'\n'"${ENTRY}" ;;
              fix*|Fix*|bug*|Bug*)
                FIXES="${FIXES}"$'\n'"${ENTRY}" ;;
              doc*|Doc*|readme*|README*)
                DOCS="${DOCS}"$'\n'"${ENTRY}" ;;
              chore*|Chore*|refactor*|Refactor*|ci*|CI*|build*|Build*|bump*|Bump*|remove*|Remove*)
                CHORES="${CHORES}"$'\n'"${ENTRY}" ;;
              *)
                OTHER="${OTHER}"$'\n'"${ENTRY}" ;;
            esac
          done < /tmp/commits.txt

          CONTRIBUTORS=$(git log "$RANGE" --pretty=format:"%an" -- "plugins/${PLUGIN}" | sort -u | sed 's/^/- /')

          {
            echo "## What's Changed"
            echo ""

            if [ -n "$FEATURES" ]; then
              echo "### Plugin Changes"
              echo "$FEATURES"
              echo ""
            fi

            if [ -n "$FIXES" ]; then
              echo "### Bug Fixes"
              echo "$FIXES"
              echo ""
            fi

            if [ -n "$DOCS" ]; then
              echo "### Documentation"
              echo "$DOCS"
              echo ""
            fi

            if [ -n "$OTHER" ]; then
              echo "### Other Changes"
              echo "$OTHER"
              echo ""
            fi

            if [ -n "$CHORES" ]; then
              echo "### Maintenance"
              echo "$CHORES"
              echo ""
            fi

            echo "### Contributors"
            echo "$CONTRIBUTORS"
            echo ""
          } > /tmp/release_notes.md

      - name: Create GitHub release
        env:
          GH_TOKEN: ${{ secrets.RELEASE_TOKEN }}
          PATCH_TAG: ${{ needs.publish-tags.outputs.patch_tag }}
          MINOR_TAG: ${{ needs.publish-tags.outputs.minor_tag }}
          PRERELEASE: ${{ inputs.prerelease }}
        run: |
          PRERELEASE_FLAG=""
          if [ "$PRERELEASE" = "true" ]; then
            PRERELEASE_FLAG="--prerelease"
          fi

          gh release create "$PATCH_TAG" \
            --title "$PATCH_TAG" \
            --notes-file /tmp/release_notes.md \
            $PRERELEASE_FLAG
