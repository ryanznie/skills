name: Release

on:
  workflow_dispatch:
    inputs:
      plugin:
        description: "Plugin name to release"
        required: true
        type: choice
        options:
          - calendar-skills
        default: calendar-skills
      bump:
        description: "Semver bump to apply before releasing"
        required: true
        type: choice
        options:
          - patch
          - minor
          - major
        default: patch
      prerelease:
        description: "Mark as pre-release"
        type: boolean
        default: false

jobs:
  release:
    name: Bump Version And Create GitHub Release
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - uses: actions/checkout@v6
        with:
          fetch-depth: 0

      - name: Configure git author
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"

      - name: Read current version
        id: current
        env:
          PLUGIN: ${{ inputs.plugin }}
        run: |
          VERSION=$(jq -r '.version' "plugins/${PLUGIN}/.claude-plugin/plugin.json")
          echo "version=$VERSION" >> "$GITHUB_OUTPUT"

      - name: Compute next version
        id: next
        env:
          CURRENT_VERSION: ${{ steps.current.outputs.version }}
          BUMP: ${{ inputs.bump }}
          PLUGIN: ${{ inputs.plugin }}
        run: |
          IFS='.' read -r MAJOR MINOR PATCH <<< "$CURRENT_VERSION"

          case "$BUMP" in
            patch)
              PATCH=$((PATCH + 1))
              ;;
            minor)
              MINOR=$((MINOR + 1))
              PATCH=0
              ;;
            major)
              MAJOR=$((MAJOR + 1))
              MINOR=0
              PATCH=0
              ;;
            *)
              echo "::error::Unsupported bump type: $BUMP"
              exit 1
              ;;
          esac

          NEXT_VERSION="${MAJOR}.${MINOR}.${PATCH}"
          echo "version=$NEXT_VERSION" >> "$GITHUB_OUTPUT"
          echo "tag=${PLUGIN}@${NEXT_VERSION}" >> "$GITHUB_OUTPUT"

      - name: Check if tag already exists
        env:
          TAG: ${{ steps.next.outputs.tag }}
        run: |
          if git rev-parse "refs/tags/${TAG}" >/dev/null 2>&1; then
            echo "::error::Tag ${TAG} already exists."
            exit 1
          fi

      - name: Find previous release tag
        id: prev_tag
        env:
          PLUGIN: ${{ inputs.plugin }}
        run: |
          PREV=$(git tag --list "${PLUGIN}@*" --sort=-version:refname | head -n 1 || true)
          echo "tag=${PREV}" >> "$GITHUB_OUTPUT"

      - name: Update plugin version
        env:
          PLUGIN: ${{ inputs.plugin }}
          NEXT_VERSION: ${{ steps.next.outputs.version }}
        run: |
          tmp=$(mktemp)
          jq --arg version "$NEXT_VERSION" '.version = $version' \
            "plugins/${PLUGIN}/.claude-plugin/plugin.json" > "$tmp"
          mv "$tmp" "plugins/${PLUGIN}/.claude-plugin/plugin.json"

      - name: Verify plugin version matches release tag
        env:
          PLUGIN: ${{ inputs.plugin }}
          NEXT_VERSION: ${{ steps.next.outputs.version }}
          TAG: ${{ steps.next.outputs.tag }}
        run: |
          VERSION=$(jq -r '.version' "plugins/${PLUGIN}/.claude-plugin/plugin.json")
          if [ "$VERSION" != "$NEXT_VERSION" ]; then
            echo "::error::plugin.json version ($VERSION) does not match computed release version ($NEXT_VERSION)."
            exit 1
          fi
          if [ "${PLUGIN}@${VERSION}" != "$TAG" ]; then
            echo "::error::Release tag ($TAG) does not match plugin.json version ($VERSION)."
            exit 1
          fi

      - name: Commit version bump
        env:
          PLUGIN: ${{ inputs.plugin }}
          NEXT_VERSION: ${{ steps.next.outputs.version }}
        run: |
          git add "plugins/${PLUGIN}/.claude-plugin/plugin.json"
          git commit -m "Bump ${PLUGIN} release to v${NEXT_VERSION}"

      - name: Push version bump commit
        run: |
          git push origin HEAD:${{ github.ref_name }}

      - name: Generate release notes
        env:
          PREV_TAG: ${{ steps.prev_tag.outputs.tag }}
          NEXT_VERSION: ${{ steps.next.outputs.version }}
        run: |
          if [ -n "$PREV_TAG" ]; then
            RANGE="${PREV_TAG}..HEAD"
          else
            RANGE="HEAD"
          fi

          git log "$RANGE" --pretty=format:"%H %s" > /tmp/commits.txt

          FEATURES="" DOCS="" FIXES="" CHORES="" OTHER=""

          while IFS= read -r line; do
            HASH=$(echo "$line" | cut -d' ' -f1)
            SUBJECT=$(echo "$line" | cut -d' ' -f2-)
            SHORT="${HASH:0:7}"
            ENTRY="- ${SUBJECT} (\`${SHORT}\`)"

            case "$SUBJECT" in
              feat*|add*|Add*|new*|New*|implement*|Implement*)
                FEATURES="${FEATURES}"$'\n'"${ENTRY}" ;;
              fix*|Fix*|bug*|Bug*)
                FIXES="${FIXES}"$'\n'"${ENTRY}" ;;
              doc*|Doc*|readme*|README*)
                DOCS="${DOCS}"$'\n'"${ENTRY}" ;;
              chore*|Chore*|refactor*|Refactor*|ci*|CI*|build*|Build*|bump*|Bump*|remove*|Remove*)
                CHORES="${CHORES}"$'\n'"${ENTRY}" ;;
              *)
                OTHER="${OTHER}"$'\n'"${ENTRY}" ;;
            esac
          done < /tmp/commits.txt

          CONTRIBUTORS=$(git log "$RANGE" --pretty=format:"%an" | sort -u | sed 's/^/- /')

          {
            echo "## What's Changed"
            echo ""

            if [ -n "$FEATURES" ]; then
              echo "### Skills & Features"
              echo "$FEATURES"
              echo ""
            fi

            if [ -n "$FIXES" ]; then
              echo "### Bug Fixes"
              echo "$FIXES"
              echo ""
            fi

            if [ -n "$DOCS" ]; then
              echo "### Documentation"
              echo "$DOCS"
              echo ""
            fi

            if [ -n "$OTHER" ]; then
              echo "### Other Changes"
              echo "$OTHER"
              echo ""
            fi

            if [ -n "$CHORES" ]; then
              echo "### Maintenance"
              echo "$CHORES"
              echo ""
            fi

            echo "### Contributors"
            echo "$CONTRIBUTORS"
            echo ""

            if [ -n "$PREV_TAG" ]; then
              echo "**Full Changelog**: https://github.com/${{ github.repository }}/compare/${PREV_TAG}...${TAG}"
            else
              echo "**Full Changelog**: https://github.com/${{ github.repository }}/commits/${TAG}"
            fi
          } > /tmp/release_notes.md

      - name: Create tag
        env:
          TAG: ${{ steps.next.outputs.tag }}
        run: |
          git tag "$TAG"
          git push origin "$TAG"

      - name: Create GitHub release
        env:
          GH_TOKEN: ${{ github.token }}
          PLUGIN: ${{ inputs.plugin }}
          TAG: ${{ steps.next.outputs.tag }}
        run: |
          PRERELEASE_FLAG=""
          if [ "${{ inputs.prerelease }}" = "true" ]; then
            PRERELEASE_FLAG="--prerelease"
          fi

          gh release create "$TAG" \
            --title "${TAG}" \
            --notes-file /tmp/release_notes.md \
            $PRERELEASE_FLAG
